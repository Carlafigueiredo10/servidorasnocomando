<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soletrando Tecnologia — Servidoras no Comando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #030308;
      --bg-card:      rgba(255,255,255,0.03);
      --bg-hover:     rgba(255,255,255,0.055);
      --border:       rgba(255,255,255,0.07);
      --border-focus: rgba(167,139,250,0.4);
      --lavanda:      #A78BFA;
      --ambar:        #F5A623;
      --verde:        #34D399;
      --rosa:         #FB7185;
      --cyan:         #22D3EE;
      --blue:         #60A5FA;
      --text:         #F7F7F8;
      --muted:        #6B6B80;
      --muted2:       #4a4a5a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* AMBIENT */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(167,139,250,0.05) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 85% 80%, rgba(34,211,238,0.04) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* BACK BTN */
    .back-btn {
      position: fixed; top: 1.25rem; left: 1.25rem; z-index: 100;
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1rem;
      background: rgba(10,10,18,0.9); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); text-decoration: none;
      font-size: 0.78rem; font-weight: 500; transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--border-focus); }
    .back-btn svg { width: 14px; height: 14px; }

    /* HERO */
    .hero {
      position: relative; z-index: 1;
      padding: 7rem 1.5rem 3.5rem;
      max-width: 860px; margin: 0 auto;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 1rem;
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 100px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em;
      color: var(--lavanda); text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .hero-title span { color: var(--lavanda); }

    .hero-desc {
      font-size: 1.05rem; color: var(--muted);
      line-height: 1.7; max-width: 560px; margin: 0 auto 2.5rem;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
      margin-bottom: 3rem;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      color: var(--lavanda);
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* SEARCH */
    .search-wrap {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto 1.5rem;
      padding: 0 1.5rem;
    }
    .search-icon {
      position: absolute; left: 2.75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-icon svg { width: 17px; height: 17px; }
    #search-input {
      width: 100%; padding: 0.9rem 1.1rem 0.9rem 3rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text); font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    #search-input::placeholder { color: var(--muted2); }
    #search-input:focus {
      border-color: var(--border-focus);
      background: rgba(167,139,250,0.04);
    }
    #search-clear {
      position: absolute; right: 2.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      display: none; padding: 0.2rem;
    }
    #search-clear svg { width: 15px; height: 15px; }

    /* FILTER TABS */
    .filter-wrap {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto 3rem;
      padding: 0 1.5rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--muted); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .filter-btn.active {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.35);
      color: var(--lavanda);
    }

    /* ALPHABET JUMP */
    .alpha-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(3,3,8,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      display: flex; gap: 0.1rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 2.5rem;
    }
    .alpha-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--muted2); font-size: 0.72rem; font-weight: 600;
      font-family: 'DM Mono', monospace;
      cursor: pointer; border-radius: 6px; transition: all 0.15s;
    }
    .alpha-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .alpha-btn.has-terms { color: var(--muted); }
    .alpha-btn.has-terms:hover { color: var(--lavanda); background: rgba(167,139,250,0.08); }

    /* MAIN CONTENT */
    .main {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    /* LETTER GROUP */
    .letter-group { margin-bottom: 3rem; }
    .letter-anchor {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      color: var(--lavanda); opacity: 0.35;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 80px;
    }

    /* TERM CARD */
    .term-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 0.6rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .term-card:hover { border-color: rgba(255,255,255,0.12); }
    .term-card.open { border-color: rgba(167,139,250,0.25); }

    .term-trigger {
      width: 100%; padding: 1.1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      background: none; border: none; cursor: pointer;
      text-align: left; transition: background 0.15s;
    }
    .term-trigger:hover { background: var(--bg-hover); }

    .term-cat-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }

    .term-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--text); flex: 1;
    }

    .term-mini {
      font-size: 0.82rem; color: var(--muted);
      flex: 2; text-align: left;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .term-cat-badge {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.6rem;
      border-radius: 100px; border: 1px solid;
      white-space: nowrap; flex-shrink: 0;
    }

    .term-arrow {
      width: 18px; height: 18px; color: var(--muted2); flex-shrink: 0;
      transition: transform 0.25s;
    }
    .term-card.open .term-arrow { transform: rotate(180deg); }

    /* EXPANDED BODY */
    .term-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .term-card.open .term-body { max-height: 600px; }

    .term-inner {
      padding: 0 1.25rem 1.4rem;
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem 2rem;
    }

    @media (max-width: 600px) {
      .term-inner { grid-template-columns: 1fr; }
      .term-mini { display: none; }
    }

    .term-block-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted2); margin-bottom: 0.35rem;
    }
    .term-block-text {
      font-size: 0.88rem; color: var(--muted); line-height: 1.65;
    }
    .term-block-text strong { color: var(--text); font-weight: 500; }

    .term-pronunc {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem; color: var(--ambar);
      letter-spacing: 0.03em;
    }

    .term-example {
      grid-column: 1 / -1;
      background: rgba(167,139,250,0.05);
      border: 1px solid rgba(167,139,250,0.1);
      border-radius: 10px; padding: 0.85rem 1rem;
    }
    .term-example .term-block-label { color: var(--lavanda); opacity: 0.7; }
    .term-example .term-block-text { font-style: italic; color: var(--text); opacity: 0.8; }

    /* CATEGORY COLORS */
    .cat-ia    { --cc: var(--lavanda); }
    .cat-dados { --cc: var(--cyan);    }
    .cat-dev   { --cc: var(--verde);   }
    .cat-seg   { --cc: var(--rosa);    }
    .cat-infra { --cc: var(--ambar);   }
    .cat-neg   { --cc: var(--blue);    }

    .term-cat-dot     { background: var(--cc); }
    .term-cat-badge   { color: var(--cc); border-color: color-mix(in srgb, var(--cc) 30%, transparent); background: color-mix(in srgb, var(--cc) 8%, transparent); }

    /* EMPTY STATE */
    #empty-state {
      text-align: center; padding: 4rem 1rem; display: none;
    }
    #empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state p { color: var(--muted); }

    /* COUNT BADGE */
    #results-count {
      text-align: center; font-size: 0.78rem; color: var(--muted2);
      margin-bottom: 2rem; display: none;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* FADE IN */
    .term-card { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Início
</a>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">📖 Vocabulário Digital</div>
  <h1 class="hero-title">Soletrando<br><span>Tecnologia</span></h1>
  <p class="hero-desc">O vocabulário mínimo para entrar em qualquer conversa sobre tecnologia sem se perder. Definição simples, como se fala e como usar numa frase.</p>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">Termos</div></div>
    <div class="stat"><div class="stat-num">6</div><div class="stat-label">Categorias</div></div>
    <div class="stat"><div class="stat-num">A→Z</div><div class="stat-label">Ordenados</div></div>
  </div>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  </div>
  <input type="search" id="search-input" placeholder="Buscar termo... ex: algoritmo, API, nuvem" autocomplete="off">
  <button id="search-clear" aria-label="Limpar busca">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- FILTERS -->
<div class="filter-wrap">
  <button class="filter-btn active" data-cat="all">Todos</button>
  <button class="filter-btn" data-cat="ia">🤖 Inteligência Artificial</button>
  <button class="filter-btn" data-cat="dados">📊 Dados</button>
  <button class="filter-btn" data-cat="dev">💻 Desenvolvimento</button>
  <button class="filter-btn" data-cat="seg">🔒 Segurança</button>
  <button class="filter-btn" data-cat="infra">⚙️ Infraestrutura</button>
  <button class="filter-btn" data-cat="neg">📋 Gestão & Projetos</button>
</div>

<!-- ALPHABET NAV -->
<nav class="alpha-nav" id="alpha-nav"></nav>

<!-- MAIN -->
<main class="main">
  <p id="results-count"></p>
  <div id="glossary-container"></div>
  <div id="empty-state">
    <div class="empty-icon">🔍</div>
    <p>Nenhum termo encontrado.<br>Tente outra busca.</p>
  </div>
</main>

<script>
// ─── DADOS ───────────────────────────────────────────────────────────────────
const TERMS = [
  // A
  { letter:'A', name:'Agile / Ágil', cat:'neg', mini:'Método de trabalho em ciclos curtos',
    def:'Forma de organizar projetos em ciclos curtos chamados <strong>sprints</strong>, com entregas parciais frequentes em vez de esperar o produto completo.',

  { letter:'A', name:'Algoritmo', cat:'dev', mini:'Sequência de passos para resolver um problema',

  { letter:'A', name:'Automação', cat:'dev', mini:'Fazer a máquina repetir o que você faria',

    example:'A automação do envio de relatórios mensais liberou três horas da minha semana.' },

  // B
  { letter:'B', name:'Backend', cat:'dev', mini:'A parte invisível que faz o sistema funcionar',

  { letter:'B', name:'Big Data', cat:'dados', mini:'Volumes gigantes de dados demais para Excel',

    example:'O Ministério analisa big data de saúde pública para identificar surtos antes que se alastrem.' },

  { letter:'B', name:'Bug', cat:'dev', mini:'Erro no código que causa comportamento inesperado',

  // C
  { letter:'C', name:'Cache', cat:'infra', mini:'Guardar o que já foi buscado para não buscar de novo',
    def:'Mecanismo que guarda temporariamente resultados de operações custosas para servir mais rápido na próxima vez. Por isso às vezes o site "congela" numa versão antiga.',

    example:'O site lento melhorou depois que o time ativou o cache nas páginas mais acessadas.' },

  { letter:'C', name:'ChatBot', cat:'ia', mini:'Sistema que simula uma conversa',

  { letter:'C', name:'Cloud / Nuvem', cat:'infra', mini:'Computadores de outra empresa que você aluga pela internet',

// ─── RENDER ──────────────────────────────────────────────────────────────────
const catMap = {
  ia:    { label: 'Inteligência Artificial', cls: 'cat-ia'    },
  dados: { label: 'Dados',                   cls: 'cat-dados' },
  dev:   { label: 'Desenvolvimento',         cls: 'cat-dev'   },
  seg:   { label: 'Segurança',               cls: 'cat-seg'   },
  infra: { label: 'Infraestrutura',          cls: 'cat-infra' },
  neg:   { label: 'Gestão & Projetos',       cls: 'cat-neg'   },
};

let currentCat = 'all';
let currentSearch = '';

function buildAlphaNav() {
  const letters = [...new Set(TERMS.map(t => t.letter))].sort();
  const all = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const nav = document.getElementById('alpha-nav');
  all.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn' + (letters.includes(l) ? ' has-terms' : '');
    btn.textContent = l;
    btn.dataset.l = l;
    btn.disabled = !letters.includes(l);
    btn.addEventListener('click', () => {
      const el = document.getElementById('letter-' + l);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    });
    nav.appendChild(btn);
  });
}

function matchesTerm(t) {
  if (currentCat !== 'all' && t.cat !== currentCat) return false;
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    return t.name.toLowerCase().includes(q) || t.mini.toLowerCase().includes(q) || t.def.toLowerCase().includes(q);
  }
  return true;
}

function render() {
  const container = document.getElementById('glossary-container');
  container.innerHTML = '';
  const filtered = TERMS.filter(matchesTerm);
  const countEl = document.getElementById('results-count');
  const emptyEl = document.getElementById('empty-state');

  if (filtered.length === 0) {
    countEl.style.display = 'none';
    emptyEl.style.display = 'block';
    document.getElementById('alpha-nav').style.display = 'none';
    return;
  }
  document.getElementById('alpha-nav').style.display = '';
  emptyEl.style.display = 'none';

  if (currentSearch) {
    countEl.textContent = filtered.length + ' termo' + (filtered.length !== 1 ? 's' : '') + ' encontrado' + (filtered.length !== 1 ? 's' : '');
    countEl.style.display = 'block';
  } else { countEl.style.display = 'none'; }

  const byLetter = {};
  filtered.forEach(t => {
    if (!byLetter[t.letter]) byLetter[t.letter] = [];
    byLetter[t.letter].push(t);
  });

  Object.keys(byLetter).sort().forEach(letter => {
    const group = document.createElement('div');
    group.className = 'letter-group';
    group.id = 'letter-' + letter;

    const heading = document.createElement('div');
    heading.className = 'letter-anchor';
    heading.textContent = letter;
    group.appendChild(heading);

    byLetter[letter].forEach(t => {
      const ci = catMap[t.cat];
      const card = document.createElement('div');
      card.className = 'term-card ' + ci.cls;
      card.innerHTML = `
        <button class="term-trigger" onclick="toggleCard(this)">
          <span class="term-cat-dot"></span>
          <span class="term-name">${t.name}</span>
          <span class="term-mini">${t.mini}</span>
          <span class="term-cat-badge">${ci.label}</span>
          <svg class="term-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="term-body">
          <div class="term-inner">
            <div>
              <div class="term-block-label">Definição</div>
              <div class="term-block-text">${t.def}</div>
            </div>
            <div>
              <div class="term-block-label">Como se fala</div>
              <div class="term-pronunc">${t.pronunc}</div>
            </div>
            <div class="term-example">
              <div class="term-block-label">Exemplo de uso</div>
              <div class="term-block-text">${t.example}</div>
            </div>
          </div>
        </div>`;
      group.appendChild(card);
    });
    container.appendChild(group);
  });
}

function toggleCard(btn) {
  const card = btn.closest('.term-card');
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open', !wasOpen);
}

// SEARCH
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
searchInput.addEventListener('input', () => {
  currentSearch = searchInput.value.trim();
  searchClear.style.display = currentSearch ? 'block' : 'none';
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  currentSearch = '';
  searchClear.style.display = 'none';
  render();
});

// FILTERS
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

// INIT
document.getElementById('total-count').textContent = TERMS.length;
buildAlphaNav();
render();
</script>
