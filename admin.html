<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Painel Admin — Servidoras no Comando</title>
  <style>
    :root {
      --bg: #0d0d18;
      --card: #161527;
      --card2: #1d1c33;
      --line: #2a2945;
      --txt: #e7e6f2;
      --muted: #9a98b8;
      --roxo: #a78bfa;
      --ciano: #22d3ee;
      --verde: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--ciano); }

    /* ---------- Login ---------- */
    #login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-box {
      width: 100%;
      max-width: 390px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .login-box .icone { font-size: 2.2rem; margin-bottom: .6rem; }
    .login-box h1 { font-size: 1.3rem; margin-bottom: .35rem; }
    .login-box p { color: var(--muted); font-size: .85rem; margin-bottom: 1.75rem; }
    #botao-google { display: flex; justify-content: center; min-height: 44px; }
    .aviso {
      color: var(--muted); font-size: .8rem; margin-top: 1.25rem; line-height: 1.5;
    }
    .erro { color: #fb7185; font-size: .85rem; margin-top: 1rem; min-height: 1.1rem; line-height: 1.45; }

    /* ---------- Painel ---------- */
    button {
      cursor: pointer; font-family: inherit; font-weight: 600;
      border: none; border-radius: 10px; transition: opacity .2s ease;
    }
    button:hover { opacity: .88; }
    #painel { max-width: 1040px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
    .topo {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.75rem;
    }
    .topo h1 { font-size: 1.3rem; }
    .topo .sub { color: var(--muted); font-size: .8rem; margin-top: .2rem; }
    .acoes { display: flex; gap: .6rem; }
    .btn-sec {
      padding: .55rem 1rem; font-size: .85rem;
      background: var(--card2); color: var(--txt); border: 1px solid var(--line);
    }

    .cards {
      display: grid; gap: 1rem; margin-bottom: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 14px; padding: 1.25rem 1.35rem;
    }
    .card .rotulo { color: var(--muted); font-size: .8rem; margin-bottom: .45rem; }
    .card .numero { font-size: 2.1rem; font-weight: 700; line-height: 1; }
    .card.roxo .numero { color: var(--roxo); }
    .card.ciano .numero { color: var(--ciano); }
    .card.verde .numero { color: var(--verde); }

    .bloco {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 14px; padding: 1.35rem 1.4rem; margin-bottom: 1.5rem;
    }
    .bloco h2 { font-size: 1rem; margin-bottom: 1.1rem; }
    .grafico-area { position: relative; height: 300px; }

    .lista-paginas { display: flex; flex-direction: column; gap: .7rem; }
    .pagina-item { display: flex; flex-direction: column; gap: .3rem; }
    .pagina-topo { display: flex; justify-content: space-between; font-size: .85rem; }
    .pagina-topo .nome { color: var(--txt); }
    .pagina-topo .qtd { color: var(--muted); font-variant-numeric: tabular-nums; }
    .barra { height: 8px; background: var(--card2); border-radius: 99px; overflow: hidden; }
    .barra > span {
      display: block; height: 100%;
      background: linear-gradient(90deg, var(--roxo), var(--ciano));
      border-radius: 99px;
    }
    .vazio { color: var(--muted); font-size: .88rem; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="login">
    <div class="login-box">
      <div class="icone">🔒</div>
      <h1>Entrar no painel</h1>
      <p>Servidoras no Comando — estatísticas de visitas</p>
      <div id="botao-google"></div>
      <div class="aviso" id="aviso-login">Acesso restrito. Entre com a conta Google autorizada.</div>
      <div class="erro" id="erro-login"></div>
    </div>
  </div>

  <!-- ===================== PAINEL ===================== -->
  <div id="painel" hidden>
    <div class="topo">
      <div>
        <h1>📊 Painel de Visitas</h1>
        <div class="sub" id="atualizado"></div>
      </div>
      <div class="acoes">
        <button class="btn-sec" id="btn-atualizar">↻ Atualizar</button>
        <button class="btn-sec" id="btn-sair">Sair</button>
      </div>
    </div>

    <div class="cards">
      <div class="card roxo">
        <div class="rotulo">Visitas (total)</div>
        <div class="numero" id="n-visitas">—</div>
      </div>
      <div class="card ciano">
        <div class="rotulo">Acessos de página (total)</div>
        <div class="numero" id="n-acessos">—</div>
      </div>
      <div class="card verde">
        <div class="rotulo">Visitas hoje</div>
        <div class="numero" id="n-visitas-hoje">—</div>
      </div>
      <div class="card">
        <div class="rotulo">Acessos hoje</div>
        <div class="numero" id="n-acessos-hoje">—</div>
      </div>
    </div>

    <div class="bloco">
      <h2>Evolução nos últimos 30 dias</h2>
      <div class="grafico-area"><canvas id="grafico"></canvas></div>
    </div>

    <div class="bloco">
      <h2>Acessos por página</h2>
      <div class="lista-paginas" id="lista-paginas"></div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    var CHAVE_TOKEN = 'snc_admin_token';
    var clientId = null;
    var grafico = null;

    var $ = function (id) { return document.getElementById(id); };

    $('btn-sair').addEventListener('click', sair);
    $('btn-atualizar').addEventListener('click', function () {
      var t = sessionStorage.getItem(CHAVE_TOKEN);
      if (!t) { sair(); return; }
      buscar(t).then(mostrarPainel).catch(function (msg) {
        alert('Não foi possível atualizar: ' + msg + '\n\nFaça login novamente.');
        sair();
      });
    });

    // ---------- Inicialização ----------
    fetch('/.netlify/functions/get-config')
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        clientId = cfg.googleClientId;
        if (!clientId) {
          $('erro-login').innerHTML = 'O painel ainda não foi configurado.<br>Falta definir a variável <b>GOOGLE_CLIENT_ID</b> no Netlify.';
          return;
        }
        var salvo = sessionStorage.getItem(CHAVE_TOKEN);
        if (salvo) {
          buscar(salvo).then(mostrarPainel).catch(function () {
            sessionStorage.removeItem(CHAVE_TOKEN);
            prepararGoogle();
          });
        } else {
          prepararGoogle();
        }
      })
      .catch(function () {
        $('erro-login').textContent = 'Falha de conexão. Recarregue a página.';
      });

    function prepararGoogle() {
      if (!window.google || !google.accounts || !google.accounts.id) {
        return setTimeout(prepararGoogle, 200);
      }
      google.accounts.id.initialize({ client_id: clientId, callback: aoLogar });
      google.accounts.id.renderButton($('botao-google'), {
        theme: 'filled_blue', size: 'large', shape: 'pill',
        text: 'signin_with', locale: 'pt-BR', width: 270
      });
    }

    function aoLogar(resposta) {
      $('erro-login').textContent = '';
      $('aviso-login').textContent = 'Entrando...';
      buscar(resposta.credential)
        .then(function (stats) {
          sessionStorage.setItem(CHAVE_TOKEN, resposta.credential);
          mostrarPainel(stats);
        })
        .catch(function (msg) {
          $('aviso-login').textContent = 'Acesso restrito. Entre com a conta Google autorizada.';
          $('erro-login').textContent = msg;
        });
    }

    function sair() {
      sessionStorage.removeItem(CHAVE_TOKEN);
      try { google.accounts.id.disableAutoSelect(); } catch (e) {}
      $('painel').hidden = true;
      $('login').style.display = 'flex';
      $('aviso-login').textContent = 'Acesso restrito. Entre com a conta Google autorizada.';
      $('erro-login').textContent = '';
    }

    // ---------- Comunicação com o servidor ----------
    function buscar(token) {
      return fetch('/.netlify/functions/get-stats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: token })
      }).then(function (r) {
        return r.json().then(function (dados) {
          if (!r.ok) throw (dados.error || 'Erro ' + r.status);
          return dados;
        });
      }).catch(function (e) {
        throw (typeof e === 'string' ? e : 'Falha de conexão com o servidor.');
      });
    }

    // ---------- Renderização ----------
    function mostrarPainel(stats) {
      $('login').style.display = 'none';
      $('painel').hidden = false;
      render(stats);
    }

    function dataISO(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function render(stats) {
      stats = stats || {};
      var pages = stats.pages || {};
      var daily = stats.daily || {};
      var hoje = dataISO(new Date());
      var hojeDados = daily[hoje] || { visits: 0, views: 0 };

      $('n-visitas').textContent = (stats.visits || 0).toLocaleString('pt-BR');
      $('n-acessos').textContent = (stats.views || 0).toLocaleString('pt-BR');
      $('n-visitas-hoje').textContent = (hojeDados.visits || 0).toLocaleString('pt-BR');
      $('n-acessos-hoje').textContent = (hojeDados.views || 0).toLocaleString('pt-BR');

      $('atualizado').textContent = 'Atualizado em ' +
        new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

      desenharGrafico(daily);
      listarPaginas(pages);
    }

    function desenharGrafico(daily) {
      var labels = [], visitas = [], acessos = [];
      var base = new Date();
      for (var i = 29; i >= 0; i--) {
        var d = new Date(base);
        d.setDate(base.getDate() - i);
        var reg = daily[dataISO(d)] || { visits: 0, views: 0 };
        labels.push(String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0'));
        visitas.push(reg.visits || 0);
        acessos.push(reg.views || 0);
      }
      var ctx = $('grafico').getContext('2d');
      if (grafico) grafico.destroy();
      grafico = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Visitas', data: visitas,
              borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.15)',
              fill: true, tension: 0.35, borderWidth: 2, pointRadius: 2
            },
            {
              label: 'Acessos', data: acessos,
              borderColor: '#22d3ee', backgroundColor: 'rgba(34,211,238,0.08)',
              fill: true, tension: 0.35, borderWidth: 2, pointRadius: 2
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { labels: { color: '#e7e6f2' } } },
          scales: {
            x: { ticks: { color: '#9a98b8', maxRotation: 0, autoSkip: true }, grid: { color: '#2a2945' } },
            y: { beginAtZero: true, ticks: { color: '#9a98b8', precision: 0 }, grid: { color: '#2a2945' } }
          }
        }
      });
    }

    function listarPaginas(pages) {
      var itens = Object.keys(pages).map(function (k) { return { nome: k, qtd: pages[k] }; });
      itens.sort(function (a, b) { return b.qtd - a.qtd; });
      var alvo = $('lista-paginas');
      if (!itens.length) {
        alvo.innerHTML = '<div class="vazio">Ainda não há acessos registrados.</div>';
        return;
      }
      var maior = itens[0].qtd || 1;
      alvo.innerHTML = itens.map(function (it) {
        var pct = Math.max(3, Math.round((it.qtd / maior) * 100));
        return '<div class="pagina-item">' +
          '<div class="pagina-topo"><span class="nome">' + escapar(it.nome) + '</span>' +
          '<span class="qtd">' + it.qtd.toLocaleString('pt-BR') + '</span></div>' +
          '<div class="barra"><span style="width:' + pct + '%"></span></div>' +
          '</div>';
      }).join('');
    }

    function escapar(s) {
      return String(s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
  </script>
</body>
</html>
